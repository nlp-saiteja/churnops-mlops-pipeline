apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: churnops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: python:3.12-slim
          command:
            - bash
            - -c
            - |
              pip install --quiet mlflow==2.16.2 setuptools &&
              mlflow server --host 0.0.0.0 --port 5001 \
                --backend-store-uri /app/mlruns \
                --default-artifact-root /app/mlartifacts
          ports:
            - containerPort: 5001
          volumeMounts:
            - name: mlruns
              mountPath: /app/mlruns
            - name: mlartifacts
              mountPath: /app/mlartifacts
      volumes:
        - name: mlruns
          hostPath:
            path: /mlruns        # mapped via minikube mount
            type: DirectoryOrCreate
        - name: mlartifacts
          hostPath:
            path: /mlartifacts
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: churnops
spec:
  selector:
    app: mlflow
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP
